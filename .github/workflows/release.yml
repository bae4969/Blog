name: Main Branch CI/CD Pipeline

on:
  push:
    branches:
      - main # main 브랜치에 코드가 푸시(머지 포함)될 때 실행

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: /mnt/10.project/20.blog
  DEPLOY_BRANCH: main

jobs:
  # 0단계: 기본 검증 (CI)
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies for CI
        run: composer install --no-interaction --prefer-dist

      - name: PHP lint
        run: |
          find src public config -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run tests when tests directory exists
        run: |
          if [ -d tests ]; then
            composer test
          else
            echo "No tests directory. Skipping tests."
          fi

  # 1단계: 릴리스 생성 (Release)
  create-release:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      RELEASE_CREATED: ${{ steps.release_decision.outputs.release_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # package.json에서 버전 추출
      - name: Extract version
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.get_version.outputs.VERSION }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists. Skip release creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide release creation
        id: release_decision
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" = "true" ]; then
            echo "release_created=false" >> $GITHUB_OUTPUT
          else
            echo "release_created=true" >> $GITHUB_OUTPUT
          fi

      # 배포용 파일 압축
      - name: Archive production files
        if: steps.release_decision.outputs.release_created == 'true'
        run: |
          zip -r release-source.zip . -x "node_modules/*" ".git/*" ".github/*" "vendor/*" "cache/data/*"

      - name: Upload release artifact
        if: steps.release_decision.outputs.release_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: release-source.zip

      - name: Build release notes from commit history
        if: steps.release_decision.outputs.release_created == 'true'
        run: |
          set -e

          CURRENT_TAG="${{ steps.get_version.outputs.VERSION }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)

          {
            echo "## Full Commit List"
            if [ -n "$PREV_TAG" ]; then
              echo
              echo "Base: $PREV_TAG -> $CURRENT_TAG"
              echo
              git log "$PREV_TAG..HEAD" --pretty=format:'- %s (%h)'
            else
              echo
              echo "Base: initial release"
              echo
              git log --pretty=format:'- %s (%h)'
            fi
          } > RELEASE_NOTES.md

          if ! grep -q "^- " RELEASE_NOTES.md; then
            echo "- No commits found in this release window." >> RELEASE_NOTES.md
          fi

      # GitHub Release 생성
      - name: Create GitHub Release
        if: steps.release_decision.outputs.release_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: release-source.zip
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2단계: 서버 배포 (CD)
  deploy:
    needs: create-release
    if: needs.create-release.outputs.RELEASE_CREATED == 'true'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Sync source in VM directory
        run: |
          set -e

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Repository not found in $APP_DIR"
            exit 1
          fi

          # 배포에서 권한 변경은 하지 않고, 권한 문제 시 명확히 실패 처리
          if [ ! -r "$APP_DIR/.git/objects" ] || [ ! -w "$APP_DIR/.git/objects" ]; then
            echo "Permission denied for $APP_DIR/.git/objects"
            echo "Fix repository ownership/permissions manually on runner host, then retry."
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

      - name: Ensure writable directories
        run: |
          set -e
          cd "$APP_DIR"
          mkdir -p cache/data uploads/images

      - name: Deployment complete
        run: echo "Successfully deployed ${{ needs.create-release.outputs.VERSION }} to $APP_DIR"
