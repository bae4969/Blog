<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; padding: 20px; background: #181A1B; }
.test-container { 
    background: red; 
    padding: 10px; 
    margin: 0;
}
.test-inner {
    background: blue;
    padding: 0;
    margin: 0;
    display: flex;
    gap: 15px;
}
.test-main {
    flex: 1;
    background: green;
    height: 100px;
}
.test-sidebar {
    flex: 0 0 260px;
    background: yellow;
    height: 100px;
}
</style>
</head>
<body>
<div class="test-container">
    <div class="test-inner">
        <div class="test-main">MAIN</div>
        <div class="test-sidebar">SIDEBAR</div>
    </div>
</div>
<p style="color: white;">빨강(외부 컨테이너) → 파랑(flex 컨테이너) → 초록(메인) + 노랑(사이드바)</p>
<p style="color: white;">좌우 여백이 동일한지 확인하세요</p>
</body>
</html>
